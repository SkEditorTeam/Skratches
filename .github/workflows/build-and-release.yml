name: Build & Release

on:
  push:
    branches:
      - main

env:
  GRADLE_OPTS: "-Xmx4g"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          architecture: x64

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Disable Git hooks
        run: git config --global core.hooksPath /dev/null

      - name: Apply Skratches
        run: ./gradlew applyAllPatches

      - name: Build Skratched jars
        run: ./gradlew skratchedJar

      - name: Create release and upload jars
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: "Skratches Build #${{ github.run_number }}"
          body: "Automated build generated from commit: ${{ github.sha }}"
          files: |
            Skript_v*/build/libs/*-skratched.jar
