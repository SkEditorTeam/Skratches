name: Build and Release Skratched Jars

on:
  push:
    branches:
      - main

env:
  GRADLE_OPTS: "-Xmx4g"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Apply Patches
        run: ./gradlew applyAllPatches

      - name: Build Skratched Jars
        run: ./gradlew skratchedJar

      - name: Create Release and Upload Jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Skratched Build #${{ github.run_number }}"
          body: "Automated build generated from commit: ${{ github.sha }}"
          draft: false
          prerelease: true
          files: |
            Skript_v*/build/libs/*-skratched.jar
